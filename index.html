<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daqw's Shop | Premium Marketplace</title>
    <style>
        /* Sanfte Lade-Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatParticles {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1b1e 0%, #0b0c0d 100%);
            color: #dbdee1;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Schwebender Hintergrund */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: radial-gradient(rgba(88, 101, 242, 0.12) 1.5px, transparent 1.5px);
            background-size: 50px 50px;
            opacity: 0.6;
            animation: floatParticles 15s ease-in-out infinite;
            z-index: 0;
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(30, 31, 34, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(88, 101, 242, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-sizing: border-box;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #ffffff 0%, #b5bac1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #5865f2;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 5px 0 30px 0;
            text-shadow: 0 0 10px rgba(88, 101, 242, 0.3);
        }

        /* Spiele-Auswahl (Jetzt als unzerstörbare Links) */
        .category-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            display: block;
            background: #2b2d31;
            color: #949ba4;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 20px;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 45%;
            box-sizing: border-box;
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            border-color: #5865f2;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.15);
        }

        .tab-btn.active {
            background: #5865f2;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            border-color: #5865f2;
        }

        /* Seiten-Umschaltung */
        .shop-page {
            display: none;
        }

        .shop-page.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Item-Karten Design */
        .item-card {
            background: linear-gradient(145deg, #1e1f22, #141517);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-card:hover {
            transform: translateY(-8px);
            border-color: rgba(88, 101, 242, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .item-image-placeholder {
            height: 100px;
            background: #111214;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .item-card h4 {
            margin: 0 0 5px 0;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .item-price {
            color: #23a55a;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 18px;
        }

        /* Bestell-Button */
        .btn-buy {
            display: block;
            background: #23a55a;
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-buy:hover {
            background: #1a7f43;
            box-shadow: 0 0 15px rgba(35, 165, 90, 0.5);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Daqw's Shop</h1>
        <p class="subtitle">Premium Marketplace</p>

        <!-- Spiele-Auswahl (Jetzt als feste, klickbare Links) -->
        <div class="category-select">
            <a href="#" id="btn-mm2" class="tab-btn active" onclick="openGame(event, 'mm2')">🔪 Murder Mystery 2</a>
            <a href="#" id="btn-bladeball" class="tab-btn" onclick="openGame(event, 'bladeball')">⚔️ Blade Ball</a>
        </div>

        <!-- ================= MM2 KATALOG ================= -->
        <div id="mm2" class="shop-page active">
            <div class="items-grid">
                
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🍬</div>
                        <h4>Candy Set</h4>
                    </div>
                    <div>
                        <div class="item-price">5.00 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🦇</div>
                        <h4>Batwing</h4>
                    </div>
                    <div>
                        <div class="item-price">3.50 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= BLADE BALL KATALOG ================= -->
        <div id="bladeball" class="shop-page">
            <div class="items-grid">
                
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🔥</div>
                        <h4>Infinity Ability</h4>
                    </div>
                    <div>
                        <div class="item-price">8.00 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Schusssicheres Umschalt-Script -->
    <script>
        function openGame(e, gameId) {
            e.preventDefault(); // Verhindert, dass die Seite nach oben springt
            
            // Alle Seiten unsichtbar machen
            var pages = document.getElementsByClassName("shop-page");
            for (var i = 0; i < pages.length; i++) {
                pages[i].classList.remove("active");
            }
            
            // Alle Tabs auf inaktiv setzen
            var tabs = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            
            // Gewählte Seite anzeigen und Tab einfärben
            document.getElementById(gameId).classList.add("active");
            e.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
