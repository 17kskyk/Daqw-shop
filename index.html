<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daqw's Shop | Premium Marketplace</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1b1e 0%, #0b0c0d 100%);
            color: #dbdee1;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(30, 31, 34, 0.85);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(88, 101, 242, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.8s ease-out forwards;
            box-sizing: border-box;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(180deg, #ffffff 0%, #b5bac1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #5865f2;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 5px 0 30px 0;
        }

        /* Spiele-Auswahl Buttons */
        .category-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: #2b2d31;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 45%;
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            border-color: #5865f2;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.15);
        }

        .tab-btn.active {
            background: #5865f2;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            border-color: #5865f2;
        }

        /* Item-Grid Ansicht */
        .shop-page {
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .shop-page.active {
            display: block;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Die Item-Karten */
        .item-card {
            background: #1e1f22;
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: rgba(88, 101, 242, 0.4);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* Platzhalter für Item-Bilder (Optional) */
        .item-image-placeholder {
            height: 100px;
            background: #111214;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .item-card h4 {
            margin: 0 0 5px 0;
            color: #ffffff;
            font-size: 1.2rem;
        }

        .item-price {
            color: #23a55a; /* Discord Grün für Preise */
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* Bestellen Button */
        .btn-buy {
            background: #23a55a;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-buy:hover {
            background: #1a7f43;
            box-shadow: 0 0 15px rgba(35, 165, 90, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Daqw's Shop</h1>
        <p class="subtitle">Premium Marketplace</p>

        <!-- Spiele-Auswahl (Tabs) -->
        <div class="category-select">
            <button class="tab-btn active" onclick="openGame('mm2')">🔪 Murder Mystery 2</button>
            <button class="tab-btn" onclick="openGame('bladeball')">⚔️ Blade Ball</button>
        </div>

        <!-- ================= MM2 KATALOG ================= -->
        <div id="mm2" class="shop-page active">
            <div class="items-grid">
                
                <!-- Item 1 -->
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🍬</div>
                        <h4>Candy Set</h4>
                    </div>
                    <div>
                        <div class="item-price">5.00 €</div>
                        <!-- Ändere hinten nach text= was im Discord-Chat stehen soll -->
                        <a href="https://discord.com/channels/1251581452817207438/1251581453316198471?text=I%20want%20to%20buy:%20Candy%20Set" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🦇</div>
                        <h4>Batwing</h4>
                    </div>
                    <div>
                        <div class="item-price">3.50 €</div>
                        <a href="https://discord.com/channels/1251581452817207438/1251581453316198471?text=I%20want%20to%20buy:%20Batwing" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= BLADE BALL KATALOG ================= -->
        <div id="bladeball" class="shop-page">
            <div class="items-grid">
                
                <!-- Item 1 -->
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🔥</div>
                        <h4>Infinity Ability</h4>
                    </div>
                    <div>
                        <div class="item-price">8.00 €</div>
                        <a href="https://discord.com/channels/1251581452817207438/1251581453316198471?text=I%20want%20to%20buy:%20Infinity%20Ability" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Script für das Umschalten zwischen den Spielen -->
    <script>
        function openGame(gameId) {
            // Alle Seiten verstecken
            var pages = document.getElementsByClassName("shop-page");
            for (var i = 0; i < pages.length; i++) {
                pages[i].classList.remove("active");
            }
            // Alle Buttons deaktivieren
            var tabs = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove("active");
            }
            // Gewählte Seite & Button aktivieren
            document.getElementById(gameId).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>

</body>
</html>
