<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daqw's Shop | Premium Marketplace</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatParticles {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1b1e 0%, #0b0c0d 100%);
            color: #dbdee1;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none; /* Verhindert das nervige Markieren von Text beim Klicken! */
            -webkit-user-select: none;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(88, 101, 242, 0.12) 1.5px, transparent 1.5px);
            background-size: 50px 50px;
            opacity: 0.6;
            animation: floatParticles 15s ease-in-out infinite;
            z-index: 0;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(30, 31, 34, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(88, 101, 242, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.8s ease-out forwards;
            box-sizing: border-box;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(180deg, #ffffff 0%, #b5bac1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #5865f2;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 5px 0 30px 0;
        }

        /* Versteckte Radio-Buttons für die Logik */
        input[type="radio"] {
            display: none;
        }

        /* Die Tabs als Klick-Labels */
        .category-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab-label {
            display: block;
            background: #2b2d31;
            color: #949ba4;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px 20px;
            font-size: 1.15rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 45%;
            box-sizing: border-box;
            text-align: center;
        }

        .tab-label:hover {
            transform: translateY(-3px);
            border-color: #5865f2;
            color: #ffffff;
        }

        /* CSS-Logik: Wenn Radio ausgewählt ist, färbe das zugehörige Label ein */
        #trigger-mm2:checked ~ .category-select .label-mm2,
        #trigger-bladeball:checked ~ .category-select .label-bladeball {
            background: #5865f2;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
            border-color: #5865f2;
        }

        /* Standardmäßig alle Seiten verstecken */
        .shop-page {
            display: none;
        }

        /* CSS-Logik: Zeige nur die ausgewählte Seite an */
        #trigger-mm2:checked ~ #mm2,
        #trigger-bladeball:checked ~ #bladeball {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .item-card {
            background: linear-gradient(145deg, #1e1f22, #141517);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-card:hover {
            transform: translateY(-8px);
            border-color: rgba(88, 101, 242, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .item-image-placeholder {
            height: 100px;
            background: #111214;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .item-card h4 {
            margin: 0 0 5px 0;
            color: #ffffff;
            font-size: 1.25rem;
        }

        .item-price {
            color: #23a55a;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 18px;
        }

        .btn-buy {
            display: block;
            background: #23a55a;
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn-buy:hover {
            background: #1a7f43;
            box-shadow: 0 0 15px rgba(35, 165, 90, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Daqw's Shop</h1>
        <p class="subtitle">Premium Marketplace</p>

        <!-- Die unsichtbaren Schalter -->
        <input type="radio" id="trigger-mm2" name="shop-tab" checked>
        <input type="radio" id="trigger-bladeball" name="shop-tab">

        <!-- Die Klick-Buttons (Labels steuern die unsichtbaren Radio-Schalter) -->
        <div class="category-select">
            <label for="trigger-mm2" class="tab-label label-mm2">🔪 Murder Mystery 2</label>
            <label for="trigger-bladeball" class="tab-label label-bladeball">⚔️ Blade Ball</label>
        </div>

        <!-- ================= MM2 KATALOG ================= -->
        <div id="mm2" class="shop-page">
            <div class="items-grid">
                
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🍬</div>
                        <h4>Candy Set</h4>
                    </div>
                    <div>
                        <div class="item-price">5.00 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🦇</div>
                        <h4>Batwing</h4>
                    </div>
                    <div>
                        <div class="item-price">3.50 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= BLADE BALL KATALOG ================= -->
        <div id="bladeball" class="shop-page">
            <div class="items-grid">
                
                <div class="item-card">
                    <div>
                        <div class="item-image-placeholder">🔥</div>
                        <h4>Infinity Ability</h4>
                    </div>
                    <div>
                        <div class="item-price">8.00 €</div>
                        <a href="https://discord.gg/F9Z7XbBCEy" target="_blank" class="btn-buy">🛒 Order via Discord</a>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
